name: Daily Agent Briefing

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run daily agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ROSS_EMAIL: ${{ secrets.ROSS_EMAIL }}
        run: node agents/daily-briefing.mjs
