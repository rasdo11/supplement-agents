name: Weekly Agent Briefing

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      research_request:
        description: 'Optional ad-hoc research request for the Research Agent'
        required: false
        default: ''

jobs:
  run-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run daily agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ROSS_EMAIL: ${{ secrets.ROSS_EMAIL }}
          RESEARCH_REQUEST: ${{ inputs.research_request }}
        run: node agents/daily-briefing.mjs

      - name: Commit briefing to repo
        run: |
          git config user.name "Supplement Agents"
          git config user.email "ross.asdo@gmail.com"
          git add BRIEFINGS.md
          git diff --staged --quiet || git commit -m "Briefing: $(date +%Y-%m-%d)"
          git push origin HEAD
